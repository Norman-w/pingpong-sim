<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>乒乓球物理仿真 — 掉落 / 反弹 / 碰撞</title>
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  body { background:#1a1a2e; font-family:system-ui,sans-serif; overflow:hidden; height:100vh; }
  #c { width:100vw; height:100vh; }
  .panel { position:fixed; top:16px; left:16px; background:rgba(22,22,44,0.92); backdrop-filter:blur(12px); border:1px solid rgba(255,255,255,0.08); border-radius:12px; padding:16px 20px; color:#e0e0e0; z-index:10; font-size:13px; line-height:1.6; pointer-events:none; }
  .panel h1 { font-size:16px; font-weight:600; color:#fff; margin-bottom:6px; }
  .hint { color:#8899aa; font-size:11px; margin-top:6px; }
  .panel button { pointer-events:auto; margin-top:8px; margin-right:4px; background:rgba(255,209,102,0.15); border:1px solid #ffd166; color:#ffd166; padding:6px 14px; border-radius:6px; cursor:pointer; font-size:12px; }
  .panel button:hover { background:rgba(255,209,102,0.3); }
  .panel button.danger { background:rgba(255,100,100,0.12); border-color:#ff6666; color:#ff8888; }
  .machine-panel { position:fixed; left:16px; top:154px; width:390px; max-height:calc(100vh - 170px); overflow:auto; background:rgba(17,19,38,0.94); backdrop-filter:blur(14px); border:1px solid rgba(255,255,255,0.1); border-radius:12px; padding:14px; color:#e8e8ee; z-index:12; font-size:12px; scrollbar-width:thin; scrollbar-color:#445 #18182b; }
  .machine-header { display:flex; align-items:center; justify-content:space-between; margin-bottom:10px; }
  .machine-header h2 { font-size:15px; color:#fff; }
  .machine-status { color:#8c96aa; font:11px monospace; }
  .machine-status.running { color:#5ee6a8; }
  .machine-actions { display:flex; gap:7px; margin-bottom:10px; }
  .machine-actions button { flex:1; border:1px solid #4e5975; color:#dce4ff; background:#272c42; border-radius:7px; padding:8px 6px; cursor:pointer; }
  .machine-actions button.primary { color:#17182a; background:#ffd166; border-color:#ffd166; font-weight:700; }
  .machine-actions button.active { background:#193e32; border-color:#5ee6a8; color:#76efba; }
  .machine-controls { display:grid; grid-template-columns:1fr 1fr; gap:8px 12px; padding:10px; border-radius:8px; background:rgba(255,255,255,0.035); }
  .view-section { margin-top:10px; padding:10px; border-radius:8px; background:rgba(255,255,255,0.035); }
  .view-section h3 { margin:0 0 7px; font-size:12px; color:#dce4ff; }
  .view-section h3 + h3 { margin-top:9px; }
  .view-buttons { display:grid; grid-template-columns:repeat(4, minmax(0,1fr)); gap:5px; }
  .view-buttons button { margin:0; padding:6px 3px; border:1px solid #4e5975; border-radius:6px; background:#242940; color:#cdd7ef; font-size:11px; cursor:pointer; }
  .view-buttons button:hover { background:#303851; }
  .view-buttons button.active { border-color:#ffd166; background:rgba(255,209,102,.18); color:#fff2c2; box-shadow:0 0 0 1px rgba(255,209,102,.2) inset; }
  .tracking-actions { display:grid; grid-template-columns:1.35fr .65fr; gap:5px; margin-top:7px; }
  .tracking-actions button { margin:0; padding:7px 4px; border:1px solid #54d6ff; border-radius:6px; background:rgba(84,214,255,.1); color:#9ceaff; cursor:pointer; }
  .tracking-actions button.secondary { border-color:#59647f; background:#242940; color:#aeb8ca; }
  .tracking-status { margin-top:7px; min-height:34px; padding:6px 7px; border-radius:5px; background:rgba(84,214,255,.07); color:#aebdd1; line-height:1.45; }
  .tracking-status strong { color:#fff; }
  .machine-control { display:grid; gap:3px; color:#aeb7ca; }
  .machine-control label { display:flex; justify-content:space-between; gap:6px; }
  .machine-control input[type="range"] { width:100%; accent-color:#ffd166; }
  .machine-control select { width:100%; color:#e8e8ee; background:#252a40; border:1px solid #454d68; border-radius:5px; padding:4px; }
  .random-control { display:flex; align-items:center; gap:7px; align-self:end; min-height:26px; color:#c5ccdb; }
  .random-control input { accent-color:#ffd166; }
  .machine-detail { margin:10px 0; padding:9px 10px; color:#adb8cb; line-height:1.55; background:rgba(255,209,102,0.06); border-left:2px solid #ffd166; border-radius:4px; }
  .machine-detail strong { color:#fff; }
  .spin-grid { display:grid; grid-template-columns:repeat(2,1fr); gap:5px; margin-top:7px; }
  .spin-chip { background:rgba(255,255,255,.055); border-radius:5px; padding:5px 6px; color:#9ca8bd; }
  .spin-chip b { float:right; color:#fff; font-variant-numeric:tabular-nums; }
  .info-button { margin-top:7px; border:1px solid #65708c; color:#cdd7ef; background:#252a40; border-radius:5px; padding:5px 8px; cursor:pointer; }
  .preset-button::after { content:attr(data-tip); display:none; position:fixed; left:420px; top:170px; width:260px; padding:8px; border-radius:6px; background:#111426; color:#e8ecf7; border:1px solid #4b5671; z-index:40; pointer-events:none; text-align:left; line-height:1.45; }
  .preset-button:hover::after { display:block; }
  .preset-group { margin-top:10px; }
  .preset-group h3 { color:#8994aa; font-size:11px; font-weight:600; margin-bottom:5px; }
  .preset-buttons { display:grid; grid-template-columns:repeat(4, minmax(0,1fr)); gap:5px; }
  .preset-button { position:relative; min-height:32px; padding:5px 3px; border:1px solid color-mix(in srgb, var(--preset-color), #222 52%); border-radius:6px; background:color-mix(in srgb, var(--preset-color), transparent 88%); color:#dce1ec; font-size:11px; cursor:pointer; line-height:1.15; }
  .preset-button:hover { background:color-mix(in srgb, var(--preset-color), transparent 76%); }
  .preset-button.active { border-color:var(--preset-color); color:#fff; box-shadow:0 0 0 1px color-mix(in srgb, var(--preset-color), transparent 55%) inset; }
  .preset-button kbd { position:absolute; top:2px; right:3px; color:#818ba0; font:8px monospace; }
  .machine-footer { display:flex; justify-content:space-between; margin-top:11px; padding-top:8px; border-top:1px solid rgba(255,255,255,.07); color:#8993a8; font:10px monospace; }
  .stats { position:fixed; top:16px; right:16px; background:rgba(22,22,44,0.92); backdrop-filter:blur(12px); border:1px solid rgba(255,255,255,0.08); border-radius:12px; padding:12px 16px; color:#e0e0e0; z-index:10; font-size:12px; font-family:monospace; line-height:1.8; }
  .stats span { color:#ffd166; }
  .demo-panel { position:fixed; right:16px; bottom:16px; width:360px; padding:14px; color:#e8e8ee; background:rgba(17,19,38,.94); border:1px solid rgba(255,255,255,.1); border-radius:12px; z-index:12; font-size:12px; }
  .demo-panel h2 { font-size:14px; margin-bottom:5px; }
  .demo-panel p { color:#9da9bd; line-height:1.45; }
  .demo-controls { display:grid; grid-template-columns:repeat(3,1fr); gap:9px; margin:10px 0; }
  .demo-controls label { display:grid; gap:3px; color:#bdc7d8; }
  .demo-controls input { width:100%; accent-color:#ff5d73; }
  .demo-actions { display:flex; gap:7px; }
  .demo-actions button { flex:1; padding:7px; border-radius:6px; cursor:pointer; border:1px solid #ff697d; background:rgba(255,93,115,.14); color:#ff9aaa; }
  .demo-legend { margin-top:8px; display:flex; gap:12px; color:#a9b3c5; }
  .demo-legend i { display:inline-block; width:18px; height:3px; margin-right:4px; vertical-align:middle; }
  .demo-metrics { margin-top:8px; padding:7px 8px; border-radius:6px; background:rgba(255,93,115,.08); color:#d7dfef; line-height:1.5; font-variant-numeric:tabular-nums; }
  dialog { margin:auto; width:min(560px,calc(100vw - 32px)); color:#e9edf7; background:#171a2d; border:1px solid #59647f; border-radius:12px; padding:20px; line-height:1.6; }
  dialog::backdrop { background:rgba(4,5,12,.72); backdrop-filter:blur(3px); }
  dialog h2 { margin-bottom:8px; } dialog h3 { margin-top:12px; color:#ffd166; font-size:13px; }
  dialog p, dialog li { color:#b9c3d5; } dialog ul { padding-left:20px; }
  dialog button { margin-top:14px; padding:7px 14px; border-radius:6px; border:1px solid #66718d; background:#2a3048; color:#fff; cursor:pointer; }
  .lucide { width:1em; height:1em; vertical-align:-0.125em; stroke-width:1.5; }
  .panel .lucide, .hint .lucide { margin-right:2px; }
  button .lucide { margin-right:4px; }
  @media (max-width:700px) {
    .machine-panel { width:calc(100vw - 32px); top:auto; bottom:12px; max-height:54vh; }
    .preset-buttons { grid-template-columns:repeat(3, minmax(0,1fr)); }
    .stats { display:none; }
    .demo-panel { display:none; }
  }
</style>
</head>
<body>
<div id="c"></div>
<div class="panel">
  <h1><svg width="1.2em" height="1.2em" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" style="vertical-align:-0.25em"><ellipse cx="11" cy="10" rx="7" ry="9" transform="rotate(-15 11 10)"/><line x1="16" y1="17" x2="21" y2="21"/><circle cx="13" cy="7" r="1.8"/></svg> 乒乓球物理仿真</h1>
  <div class="hint"><i data-lucide="mouse-pointer-2" class="lucide"></i> 拖动视角 | F 发一球 | P 连续 | 数字1–9快捷球路 | X 清除</div>
  <button onclick="window.dropBall()"><i data-lucide="arrow-down" class="lucide"></i>扔一颗</button>
  <button onclick="window.dropBalls(5)"><i data-lucide="arrow-down" class="lucide"></i>×5</button>
  <button class="danger" onclick="window.clearBalls()"><i data-lucide="x" class="lucide"></i>清除</button>
</div>
<aside class="machine-panel" aria-label="发球机控制台">
  <div class="machine-header">
    <h2>🏓 对面发球机</h2>
    <span id="machine-status" class="machine-status">已停止</span>
  </div>
  <div class="machine-actions">
    <button id="machine-once" class="primary" type="button">发一球 [F]</button>
    <button id="machine-toggle" type="button">连续发球 [P]</button>
  </div>
  <div class="machine-controls">
    <div class="machine-control">
      <label for="machine-strength"><span>力度</span><span id="strength-value">100%</span></label>
      <input id="machine-strength" type="range" min="60" max="140" step="5" value="100">
    </div>
    <div class="machine-control">
      <label for="machine-level"><span>选手强度参考</span></label>
      <select id="machine-level">
        <option value="beginner">业余入门</option>
        <option value="club" selected>业余俱乐部</option>
        <option value="advanced">专业训练</option>
        <option value="world">世界级参考</option>
      </select>
    </div>
    <div class="machine-control">
      <label for="ball-style"><span>球体样式</span></label>
      <select id="ball-style">
        <option value="white">纯白</option>
        <option value="yellow">纯黄</option>
        <option value="white-yellow-split">白黄双拼</option>
        <option value="white-yellow-eight">白黄8拼</option>
        <option value="rainbow" selected>彩球</option>
      </select>
    </div>
    <div class="machine-control">
      <label for="machine-cadence"><span>频率</span><span id="cadence-value">1.2 球/秒</span></label>
      <input id="machine-cadence" type="range" min="0.4" max="3" step="0.1" value="1.2">
    </div>
    <div class="machine-control">
      <label for="machine-lane"><span>落点区域</span></label>
      <select id="machine-lane">
        <option value="random">全台随机</option>
        <option value="forehand">正手位</option>
        <option value="middle">中路</option>
        <option value="backhand">反手位</option>
      </select>
    </div>
    <label class="random-control"><input id="machine-randomize" type="checkbox" checked> 落点扰动</label>
  </div>
  <div class="view-section" aria-label="观察者视角与站位">
    <h3>观察身高（眼睛高度）</h3>
    <div class="view-buttons" id="view-heights">
      <button type="button" data-view-height="800">幼儿 0.8m</button>
      <button type="button" data-view-height="950">儿童 0.95m</button>
      <button type="button" data-view-height="1100">儿童 1.1m</button>
      <button type="button" data-view-height="1350">青少年 1.35m</button>
      <button type="button" data-view-height="1600" class="active">成人 1.6m</button>
      <button type="button" data-view-height="1800">高个 1.8m</button>
    </div>
    <h3>站位</h3>
    <div class="view-buttons" id="view-stances">
      <button type="button" data-view-stance="near">近台</button>
      <button type="button" data-view-stance="mid" class="active">中台</button>
      <button type="button" data-view-stance="far">远台</button>
      <button type="button" data-view-stance="forehand">正手位</button>
      <button type="button" data-view-stance="middle">中路</button>
      <button type="button" data-view-stance="backhand">反手位</button>
    </div>
    <h3>处理手法与击球点</h3>
    <div class="view-buttons" id="contact-techniques">
      <button type="button" data-contact-technique="forehand-loop" class="active">正手拉球</button>
      <button type="button" data-contact-technique="forehand-drive">正手快攻</button>
      <button type="button" data-contact-technique="backhand-loop">反手拧拉</button>
      <button type="button" data-contact-technique="block">快带/挡</button>
      <button type="button" data-contact-technique="push">搓球</button>
      <button type="button" data-contact-technique="chop">削球</button>
    </div>
    <div class="tracking-actions">
      <button id="tracking-start" type="button">跟球至击球瞬间</button>
      <button id="tracking-stop" class="secondary" type="button">退出跟球</button>
    </div>
    <div id="tracking-status" class="tracking-status"><strong>正手拉球</strong>：身体右前方，在最高点附近或下降初段迎球。</div>
  </div>
  <div id="machine-detail" class="machine-detail"></div>
  <div id="preset-groups"></div>
  <div class="machine-footer">
    <span>已发射 <b id="machine-shot-count">0</b></span>
    <span>接球方落台 <b id="machine-land-count">0</b></span>
  </div>
</aside>
<aside class="demo-panel" aria-label="专题演示">
  <h2>🔬 专题演示 01 · 拉球为什么更易上台</h2>
  <p>保持相近出射方向，对比无旋与旋转。上旋使大力量球下扎，侧旋使球横向弯曲；落台摩擦再把旋转转成前冲/侧拐。</p>
  <div class="demo-controls">
    <label>力量 <span id="demo-power-value">9.0 m/s</span><input id="demo-power" type="range" min="55" max="140" value="90" step="5"></label>
    <label>上旋 <span id="demo-spin-value">4500 rpm</span><input id="demo-spin" type="range" min="0" max="8000" value="4500" step="250"></label>
    <label>侧旋 <span id="demo-side-value">0 rpm</span><input id="demo-side" type="range" min="-4000" max="4000" value="0" step="250"></label>
  </div>
  <div class="demo-actions"><button id="demo-preview">更新轨迹</button><button id="demo-fire">对比发射</button></div>
  <div class="demo-legend"><span><i style="background:#b8c0cc"></i>无旋基准</span><span><i style="background:#ff5d73"></i>旋转拉球</span></div>
  <div id="demo-metrics" class="demo-metrics"></div>
</aside>
<dialog id="parameter-dialog">
  <h2 id="dialog-title">球路参数说明</h2>
  <div id="dialog-content"></div>
  <button id="dialog-close" type="button">关闭</button>
</dialog>
<div class="stats">
  球数: <span id="bc">0</span><br>
  FPS: <span id="fps">—</span>
</div>

<script type="module" src="/src/main.ts"></script>
</body>
</html>
